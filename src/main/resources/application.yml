spring:
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:h2:file:./storage/database/poc-recherche
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate.ddl-auto: none
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  sql.init.mode: always
  threads.virtual.enabled: true

logging:
  level:
    fr.vvlabs.recherche: INFO
    fr.vvlabs.recherche.service.parser: INFO
    fr.vvlabs.recherche.service.search: INFO
    fr.vvlabs.recherche.web: DEBUG

app:
  indexer:
    default: bert
    use-database: true
  search:
    default: bert
    wildcard: false
    vector:
      max-results: 25
      candidate-multiplier: 4
    distance:
      enabled: false
      levenshtein: ~2
  embeddings:
    model-id: sentence-transformers/all-MiniLM-L6-v2
    store:
      default: hashmap
      faiss:
        enabled: false
        base-url: http://localhost:8090
    search:
      max-results: 25
      min-score: 0.35
      semantic-weight: 0.75
      lexical-weight: 0.25
      candidate-limit: 0
  parser.ocr:
    enabled: true
    default: pdfbox #pdfbox ou tika
    tesseract:
          pdfDpi: 70
          dataPath: C:/Program Files/Tesseract-OCR/tessdata
          language: fra
          psm: 3
          oem: 1
  storage:
    default: fs
    path: ./storage/documents
  cipher:
    enabled: true
    key: zHRtFj9XxeREUhD+rqh5oI9PF4ZTN6r3Ua4ouUBq3yM=
  task:
    ocr:
      enabled: false
      delay: 5000 #300000=5min

