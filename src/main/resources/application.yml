spring:
  main:
    web-application-type: servlet
  datasource:
    url: jdbc:h2:file:./storage/database/poc-recherche
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate.ddl-auto: none
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  sql.init.mode: embedded #demarrages suivants
  #sql.init.mode: always #premiere creation de la base
  threads.virtual.enabled: true

logging:
  level:
    com.example.pocrecherche: DEBUG
    com.example.pocrecherche.service.business: INFO
    com.example.pocrecherche.service.parser: INFO
    com.example.pocrecherche.service.search: INFO
    com.example.pocrecherche.util: INFO
    com.example.pocrecherche.web: DEBUG

app:
  indexer:
    default: lucene
    use-database: false
  parser.ocr:
    enabled: false
    default: pdfbox #pdfbox ou tika
    tesseract:
          pdfDpi: 70
          dataPath: C:/Program Files/Tesseract-OCR/tessdata
          language: fra
          psm: 3
          oem: 1
  storage:
    default: fs
    path: ./storage/documents
  cipher:
    enabled: true
    key: zHRtFj9XxeREUhD+rqh5oI9PF4ZTN6r3Ua4ouUBq3yM=
  search:
    wildcard: false
    distance.enabled: false
    distance.levenshtein: ~2
  task:
    ocr:
      enabled: true
      delay: 5000 #300000=5min

