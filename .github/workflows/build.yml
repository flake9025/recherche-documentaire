name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  build_test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify

  docker_image:
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/poc-recherche-documentaire
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_nas:
    runs-on: ubuntu-latest
    needs: docker_image
    if: github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Notify NAS
        run: |
          curl -X POST "$NAS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"image":"ghcr.io/${{ github.repository_owner }}/poc-recherche-documentaire:latest"}'
        env:
          NAS_WEBHOOK_URL: ${{ secrets.NAS_WEBHOOK_URL }}
